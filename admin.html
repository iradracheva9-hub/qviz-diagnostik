<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка квиза</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="admin">
  <main class="app">
    <section id="admin-login-screen" class="screen active fade-in">
      <h1>Админ-панель</h1>
      <p class="subtitle">Введите GitHub логин владельца. При первом входе логин запомнится в браузере.</p>
      <label for="admin-login-input">GitHub логин</label>
      <input id="admin-login-input" type="text" placeholder="your_github_login" />
      <p id="admin-login-message" class="error-text" aria-live="polite"></p>
      <button id="admin-login-btn" class="btn btn-primary" type="button">Войти</button>
    </section>

    <section id="admin-panel-screen" class="screen">
      <h2>Настройки квиза</h2>
      <button id="admin-logout-btn" class="btn btn-ghost" type="button">Выйти из админки</button>
      <div class="admin-card">
        <h3>Обложка (16:9)</h3>
        <label for="cover-file-input">Загрузить изображение</label>
        <input id="cover-file-input" type="file" accept="image/*" />
        <div id="cover-preview" class="cover-preview" aria-label="Предпросмотр обложки"></div>
        <button id="save-cover-btn" class="btn btn-primary" type="button">Сохранить</button>
        <p id="cover-message" class="admin-message" aria-live="polite"></p>
      </div>

      <div class="admin-card">
        <h3>Оформление</h3>
        <label for="bot-link-input">Ссылка на чат-бота</label>
        <input id="bot-link-input" type="url" placeholder="https://t.me/your_bot" />
        <label for="bg-select">Фон страницы</label>
        <select id="bg-select">
          <option value="soft">Светлый градиент</option>
          <option value="sky">Голубой</option>
          <option value="sand">Песочный</option>
          <option value="mint">Мятный</option>
        </select>
        <label for="button-color-input">Цвет кнопки</label>
        <input id="button-color-input" type="color" value="#0f766e" />
        <label for="heading-color-input">Цвет заголовков</label>
        <input id="heading-color-input" type="color" value="#172b4d" />
        <label for="question-color-input">Цвет текста вопросов</label>
        <input id="question-color-input" type="color" value="#172b4d" />
        <label for="body-text-color-input">Цвет обычного текста (описаний)</label>
        <input id="body-text-color-input" type="color" value="#4a607e" />
      </div>

      <div class="admin-card">
        <h3>Вопросы</h3>
        <div id="admin-list" class="admin-list"></div>
      </div>

      <div class="admin-actions">
        <button id="admin-save-btn" class="btn btn-primary" type="button">Сохранить изменения</button>
        <button id="admin-reset-btn" class="btn btn-ghost" type="button">Сбросить к исходным</button>
      </div>
      <p id="admin-message" class="admin-message" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
