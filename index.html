<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мини-диагностика | Дизайн Человека</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="quiz">
  <main class="app">
    <section id="landing-screen" class="screen active fade-in">
      <div id="hero-cover" class="hero-cover" role="img" aria-label="Обложка квиза">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1 id="landing-title">Где я живу из долга, а где из отклика</h1>
          <p id="landing-subtitle">
            Мини-диагностика для тех, кто устал тащить всё на себе и хочет вернуть себе внутреннее “да” и “нет”
          </p>
          <button id="start-btn" class="btn btn-primary hero-btn">Пройти тест</button>
        </div>
      </div>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="quiz-head">
        <p id="question-counter" class="counter"></p>
        <div class="progress-wrap" aria-label="Прогресс прохождения">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>
      <h2 id="question-text" class="question"></h2>
      <div id="answers-list" class="answers"></div>
    </section>

    <section id="lead-screen" class="screen">
      <h2 id="lead-title">Почти готово!</h2>
      <p id="lead-subtitle" class="subtitle">
        Нажми кнопку ниже, чтобы получить результат и перейти в чат-бот с персональной расшифровкой.
      </p>
      <button id="lead-submit-btn" type="button" class="btn btn-primary">Получить результат</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
